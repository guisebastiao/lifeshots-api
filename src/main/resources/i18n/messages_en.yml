security:
  access-token-service:
    create-access-token: Error creating access token.
  refresh-token-service:
    validate-refresh-token:
      not-found-refresh-token: Refresh token not found.
      unauthorized: Session expired. Please log in again.
  authentication-user-provider:
    authentication-not-found: Authenticated user not found.
    invalid-identifier: Invalid user identifier.
  custom-user-details-service:
    user-not-found: User not found.
  custom-access-denied-handler:
    message: You do not have permission to access this resource.
  custom-authentication-entry-point:
    message: You must be authenticated to access this resource.
  too-many-requests:
    message: You made too many requests in a short period of time. Please try again in a few moments.

services:
  account-service:
    methods:
      profile-privacy:
        conflict: Your account already has this privacy setting.
      update-password:
        bad-request: Incorrect password.
      delete-account:
        bad-request: Incorrect password.
  auth-service:
    methods:
      register:
        conflict-email: This email is already registered.
        conflict-handle: Username is already in use.
        role-not-found: Role not found.
  comment-service:
    methods:
      create-comment:
        not-found: Post not found.
      find-all-comments:
        not-found: Post not found.
      remove-comment-in-post:
        post-not-found: Post not found.
        comment-not-found: Comment not found.
        forbidden: You do not have permission to manipulate this resource.
        bad-request: You can simply delete the comment.
      find-comment-and-belongs-to-the-profile:
        not-found: Comment not found.
        forbidden: You do not have permission to manipulate this resource.
  follow-service:
    methods:
      follow:
        not-found: Profile not found.
        conflict: You cannot follow yourself.
        bad-request-already-follow: You are already following this account.
        bad-request-dont-follow: You do not follow this account.
      find-all-followers:
        not-found: Profile not found.
  like-comment-service:
    methods:
      like-comment:
        not-found: Comment not found.
        conflict-already-liked: You have already liked this comment.
        conflict-not-liked: You have not liked this comment.
  like-post-service:
    methods:
      like-post:
        not-found: Post not found.
        conflict-already-liked: You have already liked this post.
        conflict-not-liked: You have not liked this post.
      find-all-like-post:
        not-found:  Post not found.
  like-reply-comment-service:
    methods:
      like-reply-comment:
        not-found: Comment not found.
        conflict-already-liked: You have already liked this comment.
        conflict-not-liked: You have not liked this comment.
  like-story-service:
    methods:
      like-story:
        not-found: Story not found.
        bad-request: You cannot like your own story.
        conflict-already-liked: You have already liked this story.
        conflict-not-liked: You have not liked this story.
      find-all-like-story:
        not-found: Story not found.
        forbidden: You do not have permission to manipulate this resource.
  notification-service:
    methods:
      find-notification-by-id:
        not-found: Notification not found.
        forbidden: You do not have permission to view this notification.
      read-notification-by-id:
        not-found: Notification not found.
        forbidden: You do not have permission to read this notification.
      delete-notification-by-id:
        not-found: Notification not found.
        forbidden: You do not have permission to delete this notification.
  post-service:
    methods:
      find-post-by-id:
        not-found: Post not found.
      update-post:
        bad-request-max-pictures: A post cannot have more than ten images.
        bad-request-min-pictures: A post must contain at least one image.
        bad-request-invalid-pictures: One or more images do not belong to this post.
      find-post-and-belongs-to-the-profile:
        not-found: Post not found
        forbidden: You do not have permission to manipulate this resource.
  profile-picture-service:
    methods:
      upload-profile-picture:
        not-found: Profile not found.
        conflict: You already have a profile picture.
      find-profile-picture-by-id:
        not-found: The user does not have a profile picture.
      delete-profile-picture:
        profile-not-found: Profile not found.
        picture-not-found: The user does not have a profile picture.
  profile-service:
    methods:
      find-profile-by-handle:
        not-found: Profile not found.
      find-profile-by-id:
        not-found: Profile not found.
      find-posts:
        not-found: Profile not found.
  recover-password-service:
    methods:
      recover-password:
        not-found: Invalid or non-existent recovery link.
        bad-request: The recovery link has expired or has already been used.
  reply-comment-service:
    methods:
      create-reply-comment:
        not-found: Comment not found.
      find-all-reply-comments:
        not-found: Comment not found.
      remove-reply-comment-in-comment:
        post-not-found: Post not found.
        comment-not-found: Comment not found.
        forbidden: You do not have permission to remove this resource.
        bad-request: You can simply delete the comment.
      find-reply-comment-and-belongs-to-the-profile:
        not-found: Reply comment not found.
        forbidden: You do not have permission to manipulate this resource.
  story-service:
    methods:
      create-story:
        limit-bad-request: Story limit reached.
      find-story-by-id:
        not-found: Story not found.
      find-story-and-belongs-to-the-profile:
        not-found: Story not found.
        forbidden: You do not have permission to manipulate this resource.

messages:
  comment-post:
    title: New Comment
    message: "{0} commented on your post."
  follow-account:
    title: New Follower
    message: "{0} started following you."
  like-post:
    title: New Like
    message: "{0} liked your post."
  like-comment:
    title: Comment Liked
    message: "{0} liked your comment."
  like-reply-comment:
    title: Reply Liked
    message: "{0} liked your reply."
  reply-comment:
    title: New Reply
    message: "{0} replied to your comment."
  like-story:
    title: Story Liked
    message: "{0} liked your story."

validation:
  error:
    message: Validation error.
  password:
    matcher:
      error: The passwords don't match.
  enum:
    validator:
      error: Invalid enum value.
  filesize:
    validator:
      error: The file exceeds the maximum limit.
  max-files:
    validator:
      error: Maximum number of files exceeded.
  mimetype:
    validator:
      error: File format not supported.

global-exception-handler:
  method-not-allowed: This method is not supported for this endpoint.
  route-not-found: This route does not exist.
  access-denied: You do not have permission to access this resource.
  invalid-json: The request body contains invalid or malformed JSON.
  authorization-denied-exception: You do not have permission to perform this action.
  unauthorized-exception: Please log in to access this feature.
  failed-dependency-exception: The operation could not be completed due to a failure in an external dependency or earlier step.
  private-profile-exception: Private profile. You do not have permission to access this content.
  disabled-exception: Your account is deactivated. Please contact support to reactivate it.
  session-expired-exception: Your session has expired. Please log in again.
  internal-server-error: An unexpected error occurred. Please try again later.

util:
  uuid-converter:
    invalid-id: Invalid ID.