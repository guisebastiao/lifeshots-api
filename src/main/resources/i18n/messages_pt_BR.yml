security:
  access-token-service:
    create-access-token: Erro ao criar o token de acesso.
  refresh-token-service:
    validate-refresh-token:
      not-found-refresh-token: Token de atualização não encontrado.
      unauthorized: Sessão expirada. Por favor, faça login novamente.
  authentication-user-provider:
    authentication-not-found: Usuário autenticado não encontrado.
    invalid-identifier: Identificador de usuário inválido.
  custom-user-details-service:
    user-not-found: Usuário não encontrado.
  custom-access-denied-handler:
    message: Você não tem permissão para acessar este recurso.
  custom-authentication-entry-point:
    message: Você deve estar autenticado para acessar este recurso.
  too-many-requests:
    message: Você fez muitas requisições em um curto período de tempo. Por favor, tente novamente em alguns instantes.

services:
  account-service:
    methods:
      profile-privacy:
        conflict: Sua conta já possui esta configuração de privacidade.
      update-password:
        bad-request: Senha incorreta.
      delete-account:
        bad-request: Senha incorreta.
  auth-service:
    methods:
      register:
        conflict-email: Este e-mail já está cadastrado.
        conflict-handle: Este nome de usuário já está em uso.
        role-not-found: Função (role) não encontrada.
  comment-service:
    methods:
      create-comment:
        not-found: Postagem não encontrada.
      find-all-comments:
        not-found: Postagem não encontrada.
      remove-comment-in-post:
        post-not-found: Postagem não encontrada.
        comment-not-found: Comentário não encontrado.
        forbidden: Você não tem permissão para manipular este recurso.
        bad-request: Você pode simplesmente excluir o comentário.
      find-comment-and-belongs-to-the-profile:
        not-found: Comentário não encontrado.
        forbidden: Você não tem permissão para manipular este recurso.
  follow-service:
    methods:
      follow:
        not-found: Perfil não encontrado.
        conflict: Você não pode seguir a si mesmo.
        bad-request-already-follow: Você já segue esta conta.
        bad-request-dont-follow: Você não segue esta conta.
      find-all-followers:
        not-found: Perfil não encontrado.
  like-comment-service:
    methods:
      like-comment:
        not-found: Comentário não encontrado.
        conflict-already-liked: Você já curtiu este comentário.
        conflict-not-liked: Você ainda não curtiu este comentário.
  like-post-service:
    methods:
      like-post:
        not-found: Postagem não encontrada.
        conflict-already-liked: Você já curtiu esta postagem.
        conflict-not-liked: Você ainda não curtiu esta postagem.
      find-all-like-post:
        not-found: Postagem não encontrada.
  like-reply-comment-service:
    methods:
      like-reply-comment:
        not-found: Comentário não encontrado.
        conflict-already-liked: Você já curtiu este comentário.
        conflict-not-liked: Você ainda não curtiu este comentário.
  like-story-service:
    methods:
      like-story:
        not-found: Story não encontrado.
        bad-request: Você não pode curtir seu próprio story.
        conflict-already-liked: Você já curtiu este story.
        conflict-not-liked: Você ainda não curtiu este story.
      find-all-like-story:
        not-found: Story não encontrado.
        forbidden: Você não tem permissão para manipular este recurso.
  notification-service:
    methods:
      find-notification-by-id:
        not-found: Notificação não encontrada.
        forbidden: Você não tem permissão para visualizar esta notificação.
      read-notification-by-id:
        not-found: Notificação não encontrada.
        forbidden: Você não tem permissão para ler esta notificação.
      delete-notification-by-id:
        not-found: Notificação não encontrada.
        forbidden: Você não tem permissão para excluir esta notificação.
  post-service:
    methods:
      find-post-by-id:
        not-found: Postagem não encontrada.
      update-post:
        bad-request-max-pictures: Uma postagem não pode ter mais de dez imagens.
        bad-request-min-pictures: Uma postagem deve conter pelo menos uma imagem.
        bad-request-invalid-pictures: Uma ou mais imagens não pertencem a esta postagem.
      find-post-and-belongs-to-the-profile:
        not-found: Postagem não encontrada.
        forbidden: Você não tem permissão para manipular este recurso.
  profile-picture-service:
    methods:
      upload-profile-picture:
        not-found: Perfil não encontrado.
        conflict: Você já possui uma foto de perfil.
      find-profile-picture-by-id:
        not-found: O usuário não possui uma foto de perfil.
      delete-profile-picture:
        profile-not-found: Perfil não encontrado.
        picture-not-found: O usuário não possui uma foto de perfil.
  profile-service:
    methods:
      find-profile-by-handle:
        not-found: Perfil não encontrado.
      find-profile-by-id:
        not-found: Perfil não encontrado.
      find-posts:
        not-found: Perfil não encontrado.
  recover-password-service:
    methods:
      recover-password:
        not-found: Link de recuperação inválido ou inexistente.
        bad-request: O link de recuperação expirou ou já foi utilizado.
  reply-comment-service:
    methods:
      create-reply-comment:
        not-found: Comentário não encontrado.
      find-all-reply-comments:
        not-found: Comentário não encontrado.
      remove-reply-comment-in-comment:
        post-not-found: Postagem não encontrada.
        comment-not-found: Comentário não encontrado.
        forbidden: Você não tem permissão para remover este recurso.
        bad-request: Você pode simplesmente excluir o comentário.
      find-reply-comment-and-belongs-to-the-profile:
        not-found: Resposta de comentário não encontrada.
        forbidden: Você não tem permissão para manipular este recurso.
  story-service:
    methods:
      create-story:
        limit-bad-request: Limite de stories atingido.
      find-story-by-id:
        not-found: Story não encontrado.
      find-story-and-belongs-to-the-profile:
        not-found: Story não encontrado.
        forbidden: Você não tem permissão para manipular este recurso.

messages:
  comment-post:
    title: Novo Comentário
    message: "{0} comentou na sua postagem."
  follow-account:
    title: Novo Seguidor
    message: "{0} começou a seguir você."
  like-post:
    title: Nova Curtida
    message: "{0} curtiu sua postagem."
  like-comment:
    title: Comentário Curtido
    message: "{0} curtiu seu comentário."
  like-reply-comment:
    title: Resposta Curtida
    message: "{0} curtiu sua resposta."
  reply-comment:
    title: Nova Resposta
    message: "{0} respondeu ao seu comentário."
  like-story:
    title: Story Curtido
    message: "{0} curtiu seu story."

validation:
  error:
    message: Erro de validação.
  password:
    matcher:
      error: As senhas não coincidem.
  enum:
    validator:
      error: Valor de enumeração inválido.
  filesize:
    validator:
      error: O arquivo excede o limite máximo permitido.
  max-files:
    validator:
      error: Número máximo de arquivos excedido.
  mimetype:
    validator:
      error: Formato de arquivo não suportado.

global-exception-handler:
  method-not-allowed: Este método não é suportado para este endpoint.
  route-not-found: Esta rota não existe.
  access-denied: Você não tem permissão para acessar este recurso.
  invalid-json: O corpo da requisição contém um JSON inválido ou malformado.
  authorization-denied-exception: Você não tem permissão para realizar esta ação.
  unauthorized-exception: Por favor, faça login para acessar este recurso.
  failed-dependency-exception: A operação não pôde ser concluída devido a uma falha em uma dependência externa ou etapa anterior.
  private-profile-exception: Perfil privado. Você não tem permissão para acessar este conteúdo.
  disabled-exception: Sua conta está desativa, entre com suporte para ativa-la novamente.
  session-expired-exception: Sua sessão expirou. Por favor, faça login novamente.
  internal-server-error: Ocorreu um erro inesperado. Por favor, tente novamente mais tarde.

util:
  uuid-converter:
    invalid-id: ID inválido.