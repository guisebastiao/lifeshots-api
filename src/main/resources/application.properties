spring.application.name=lifeshots-api

spring.web.resources.add-mappings=false

server.address=0.0.0.0
server.port=8080

spring.jpa.database-plataform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

auth.jwt.token.secret=${TOKEN_SECRET}
session.expiration.time=3

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=lifeshots.app@gmail.com
spring.mail.password=${MAIL_PASS}

spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

frontend.url=${FRONT_URL}

spring.rabbitmq.host=${RABBIT_HOST}
spring.rabbitmq.port=${RABBIT_PORT}
spring.rabbitmq.username=${RABBIT_USER}
spring.rabbitmq.password=${RABBIT_PASS}